# 污点分析 Sink 规则配置
- lang: python
  rules:
    - operation: call_stmt
      name: sink
      target: [\%arg0]
      vuln_type: generic_sink
    - operation: call_stmt
      name: web.FileResponse
      target: [\%arg0]
      vuln_type: path_traversal
    - operation: call_stmt
      name: pickle.load
      target: [\%arg0]
      vuln_type: insecure_deserialization
    - operation: call_stmt
      name: FileResponse
      target: [\%arg0]
      vuln_type: path_traversal
    - operation: record_write
      key: "\"data\""
      target: []
      vuln_type: data_exposure
    - operation: object_call
      name: "%this.queue.add"
      target: [\%arg0]
      vuln_type: injection
    - operation: call_stmt
      name: send_file
      target: [\%arg0]
      vuln_type: path_traversal

